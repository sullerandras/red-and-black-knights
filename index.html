<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piece Patterns on an Infinite Board</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  display: flex;
  height: 100vh;
  overflow: hidden;
  background: #0d1117;
  color: #c9d1d9;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 13px;
}

/* ── Sidebar ── */
#sidebar {
  width: 272px;
  flex-shrink: 0;
  background: #161b22;
  border-right: 1px solid #30363d;
  padding: 16px 14px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

#sidebar h1 {
  font-size: 15px;
  font-weight: 600;
  color: #f0f6fc;
  padding-bottom: 10px;
  border-bottom: 1px solid #30363d;
  letter-spacing: 0.2px;
}

.field { display: flex; flex-direction: column; gap: 5px; }

.field-label {
  font-size: 10.5px;
  font-weight: 600;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.n-row { display: flex; flex-direction: column; gap: 5px; }
.n-row input[type=number] { width: 100%; }
.n-presets { display: flex; flex-wrap: wrap; gap: 4px; }
.n-preset {
  padding: 3px 7px;
  background: #21262d;
  border: 1px solid #30363d;
  border-radius: 4px;
  color: #8b949e;
  font-size: 11px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.n-preset:hover { border-color: #58a6ff; color: #58a6ff; }

input[type=number], select {
  padding: 5px 8px;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 6px;
  color: #c9d1d9;
  font-size: 12px;
  width: 100%;
  outline: none;
  transition: border-color 0.15s;
}
input[type=number]:focus, select:focus { border-color: #58a6ff; }

/* ── Per-team rows ── */
#teamsWrap { display: flex; flex-direction: column; gap: 6px; }

.team-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.team-row input[type=color] {
  width: 26px;
  height: 26px;
  flex-shrink: 0;
  padding: 1px;
}
.team-row select { flex: 1 1 0; min-width: 0; width: auto; }
.team-label {
  font-size: 10px;
  color: #8b949e;
  white-space: nowrap;
  flex-shrink: 0;
  width: 18px;
  text-align: right;
}

.custom-ab {
  display: flex;
  align-items: center;
  gap: 5px;
  padding-left: 32px;
  margin-top: 2px;
}
.custom-ab span { color: #6e7681; font-size: 11px; flex-shrink: 0; }
.custom-ab input[type=number] {
  width: 44px;
  padding: 4px 6px;
  text-align: center;
}

input[type=color] {
  -webkit-appearance: none;
  width: 38px;
  height: 30px;
  border: 2px solid #30363d;
  border-radius: 6px;
  cursor: pointer;
  background: transparent;
  padding: 2px;
  transition: border-color 0.15s;
}
input[type=color]:hover { border-color: #58a6ff; }

hr { border: none; border-top: 1px solid #21262d; }

.color-full {
  -webkit-appearance: none;
  width: 100%;
  height: 30px;
  border: 1px solid #30363d;
  border-radius: 6px;
  cursor: pointer;
  background: transparent;
  padding: 2px;
}
.color-full:hover { border-color: #58a6ff; }

#btnGenerate {
  padding: 9px;
  background: #238636;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  letter-spacing: 0.3px;
}
#btnGenerate:hover:not(:disabled) { background: #2ea043; }
#btnGenerate.stopping { background: #b91c1c; }
#btnGenerate.stopping:hover { background: #dc2626; }
#btnGenerate:disabled { background: #21262d; color: #6e7681; cursor: not-allowed; }

#progressWrap { display: none; flex-direction: column; gap: 4px; }
#progressWrap.show { display: flex; }
progress {
  width: 100%;
  height: 5px;
  border-radius: 3px;
  border: none;
  accent-color: #58a6ff;
  overflow: hidden;
}
#progressText { font-size: 10.5px; color: #8b949e; }

#btnExport {
  padding: 7px;
  background: transparent;
  color: #c9d1d9;
  border: 1px solid #30363d;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
#btnExport:hover:not(:disabled) { border-color: #58a6ff; color: #58a6ff; }
#btnExport:disabled { opacity: 0.35; cursor: not-allowed; }

#layoutDesc {
  font-size: 11px;
  color: #6e7681;
  line-height: 1.5;
}

.toggle-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.toggle-row input[type=checkbox] {
  width: 15px;
  height: 15px;
  margin-top: 1px;
  flex-shrink: 0;
  accent-color: #58a6ff;
  cursor: pointer;
}
.toggle-body { display: flex; flex-direction: column; gap: 2px; }
.toggle-title { font-size: 12px; color: #c9d1d9; font-weight: 500; }
.toggle-desc  { font-size: 10.5px; color: #6e7681; line-height: 1.45; }

/* ── Main canvas area ── */
#main {
  flex: 1;
  overflow: auto;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 20px;
  gap: 10px;
  background: #0d1117;
}

#mainToolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  width: 100%;
}

#info {
  font-size: 11px;
  color: #8b949e;
  min-height: 1.4em;
  flex: 1;
}

#btnFit {
  padding: 4px 10px;
  background: transparent;
  color: #c9d1d9;
  border: 1px solid #30363d;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
#btnFit:hover:not(:disabled) { border-color: #58a6ff; color: #58a6ff; }
#btnFit.active { background: #1f3b5a; border-color: #58a6ff; color: #58a6ff; }
#btnFit:disabled { opacity: 0.35; cursor: not-allowed; }

#canvasWrap {
  border: 1px solid #21262d;
  border-radius: 4px;
  overflow: hidden;
  flex-shrink: 0;
  display: inline-block;
}

canvas {
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

/* ── Gallery ── */
#gallerySection { display: none; flex-direction: column; gap: 10px; width: 100%; }
#gallerySection.show { display: flex; }
#galleryStatus { font-size: 11px; color: #8b949e; min-height: 1.4em; }
#galleryGrid { display: grid; gap: 2px; }
.gal-col-hdr {
  font-size: 9px; color: #6e7681; text-align: center;
  writing-mode: vertical-rl; transform: rotate(180deg);
  overflow: hidden; white-space: nowrap; max-height: 72px; align-self: end;
}
.gal-row-hdr {
  font-size: 9px; color: #6e7681; text-align: right; padding-right: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 60px; align-self: center;
}
.gal-cell {
  width: 72px; height: 72px; position: relative;
  border: 1px solid #21262d; border-radius: 2px;
  background: #161b22; cursor: pointer; overflow: hidden;
}
.gal-cell:hover { border-color: #58a6ff; box-shadow: 0 0 0 1px #58a6ff; z-index: 1; }
.gal-cell canvas { display: block; }
.gal-cell-tip {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(13,17,23,0.88); color: #c9d1d9; font-size: 8px;
  text-align: center; padding: 2px; opacity: 0; transition: opacity 0.15s;
  line-height: 1.4;
}
.gal-cell:hover .gal-cell-tip { opacity: 1; }

#galPreview {
  position: fixed; display: none; z-index: 200;
  background: #161b22; border: 1px solid #58a6ff; border-radius: 6px;
  padding: 6px; box-shadow: 0 8px 28px rgba(0,0,0,0.7);
  pointer-events: none;
}
#galPreview canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
#galPreviewLabel { font-size: 10px; color: #8b949e; text-align: center; margin-top: 4px; }
</style>

  </div>
  <button id="btnGallery">▦ Gallery</button>

  <div style="margin-top:auto; padding-top:8px; font-size:11px; color:#8b949e;">v<span id="versionLabel"></span> · <a href="https://github.com/sullerandras/red-and-black-knights" target="_blank" rel="noopener" style="color:#58a6ff; text-decoration:none;">View source on GitHub</a></div>
</div>

<div id="main">
  <div id="mainToolbar">

<script>
// ─────────────────────────────────────────────
//  Web Worker source (inlined as blob URL)
// ─────────────────────────────────────────────
const WORKER_SRC = `
'use strict';

// ── Center Spiral (right=+x, up=+y, origin=center) ──
function spiralXY(n) {
  if (n === 0) return [0, 0];
  const n1 = n + 1;
  const k = (Math.floor(Math.sqrt(n1 - 1)) + 1) >> 1;
  let m = (2*k+1)*(2*k+1);
  const t = 2*k;
  if (n1 >= m - t) return [k - (m - n1), -k];
  m -= t;
  if (n1 >= m - t) return [-k, -k + (m - n1)];
  m -= t;
  if (n1 >= m - t) return [-k + (m - n1), k];
  return [k, k - (m - n1 - t)];
}
function xyToSpiral(x, y) {
  if (x === 0 && y === 0) return 0;
  const k = Math.max(Math.abs(x), Math.abs(y));
  const m = (2*k+1)*(2*k+1);
  if (y === -k) return m - k + x - 1;
  if (x === -k) return m - 3*k - y - 1;
  if (y ===  k) return m - 5*k - x - 1;
  return m - 7*k + y - 1;
}

// ── Corner Diagonal (anti-diagonal from top-left) ──
function diagXY(n) {
  const d = Math.floor((-1 + Math.sqrt(1 + 8*n)) / 2);
  const p = n - Math.floor(d*(d+1)/2);
  return [d - p, p];
}
function xyToDiag(x, y) {
  if (x < 0 || y < 0) return -1;
  const d = x + y;
  return Math.floor(d*(d+1)/2) + y;
}

// ── Zigzag rows (boustrophedon, origin top-left) ──
function zigzagXY(n, W) {
  const row = Math.floor(n / W);
  const col = n % W;
  return [(row & 1) ? W - 1 - col : col, row];
}
function xyToZigzag(x, y, W) {
  if (x < 0 || x >= W || y < 0) return -1;
  return y * W + ((y & 1) ? W - 1 - x : x);
}

// ── Simulation ──
self.onmessage = function(ev) {
  const { n, numTeams, layout, zigzagWidth, sequential, teamMoves } = ev.data;

  let posToXY, xyToPos;
  if (layout === 'spiral') {
    posToXY = spiralXY;
    xyToPos = xyToSpiral;
  } else if (layout === 'diagonal') {
    posToXY = diagXY;
    xyToPos = xyToDiag;
  } else {
    const W = zigzagWidth;
    posToXY = (p) => zigzagXY(p, W);
    xyToPos = (x, y) => xyToZigzag(x, y, W);
  }

  const nextPos = new Array(numTeams).fill(0);
  let   globalMin = 0;

  // Replace Map+Set with a flat Uint8Array to avoid Firefox's ~16M Map/Set entry limit.
  // Each byte: bit 0 = occupied, bit (t+1) = attacked by team t.  Max 6 teams → 7 bits → fits Uint8.
  let statusSize = Math.max(n * 4, 1 << 20);
  let posStatus  = new Uint8Array(statusSize);

  // Pre-compute per-team bitmasks.
  const myBits    = Array.from({length: numTeams}, (_, t) => 1 << (t + 1));
  const otherMasks = Array.from({length: numTeams}, (_, t) =>
    (((1 << numTeams) - 1) << 1) & ~(1 << (t + 1)));

  const xs      = new Int32Array(n);
  const ys      = new Int32Array(n);
  const teamArr = new Uint8Array(n);

  function growStatus(minIdx) {
    let newSize = statusSize;
    while (newSize <= minIdx) newSize *= 2;
    const buf = new Uint8Array(newSize);
    buf.set(posStatus);
    posStatus  = buf;
    statusSize = newSize;
  }

  const REPORT = 25000;
  const t0 = Date.now();

  for (let step = 0; step < n; step++) {
    const team      = step % numTeams;
    const otherMask = otherMasks[team];
    const myBit     = myBits[team];
    let pos = sequential ? Math.max(nextPos[team], globalMin) : nextPos[team];

    for (;;) {
      if (pos >= statusSize) growStatus(pos);
      const s = posStatus[pos];
      if (!(s & 1) && !(s & otherMask)) break;
      pos++;
    }

    posStatus[pos] |= 1;
    nextPos[team] = pos + 1;
    if (sequential) globalMin = pos + 1;
    teamArr[step] = team;

    const [x, y] = posToXY(pos);
    xs[step] = x;
    ys[step] = y;

    for (const [dx, dy] of teamMoves[team]) {
      const ap = xyToPos(x + dx, y + dy);
      if (ap >= 0) {
        if (ap >= statusSize) growStatus(ap);
        posStatus[ap] |= myBit;
      }
    }

    if (step > 0 && step % REPORT === 0) {
      const elapsed = Date.now() - t0;
      self.postMessage({ type: 'progress', done: step, total: n, elapsed });
    }
  }

  self.postMessage(
    { type: 'done', xs, ys, teams: teamArr, elapsed: Date.now() - t0 },
    [xs.buffer, ys.buffer, teamArr.buffer]
  );
};
`;

// ─────────────────────────────────────────────
//  Main app
// ─────────────────────────────────────────────
const VERSION = '1.1.0';

const DEFAULT_COLORS = ['#111111','#d41f1f','#1f6ad4','#1db84a','#9b1fd4','#e07b1f'];

const LAYOUT_DESC = {
  spiral:   'Numbers cells outward from the center in a square spiral.',
  diagonal: 'Numbers cells along anti-diagonals from the top-left corner. Produces a triangular region.',
  zigzag:   'Rows left-to-right then right-to-left (boustrophedon), starting at the top-left. Set the row width below.',
};

// ── Move generators ──
function leaperMoves(a, b) {
  const seen = new Set();
  const moves = [];
  function add(x, y) {
    if (x === 0 && y === 0) return;
    const k = `${x},${y}`;
    if (!seen.has(k)) { seen.add(k); moves.push([x, y]); }
  }
  for (const sa of [1, -1]) for (const sb of [1, -1]) {
    add(sa * a, sb * b);
    if (a !== b) add(sa * b, sb * a);
  }
  return moves;
}
function bishopMoves(range) {
  const m = [];
  for (let d = 1; d <= range; d++) m.push([d,d],[d,-d],[-d,d],[-d,-d]);
  return m;
}
function rookMoves(range) {
  const m = [];
  for (let d = 1; d <= range; d++) m.push([d,0],[-d,0],[0,d],[0,-d]);
  return m;
}
function queenMoves(range) { return [...rookMoves(range), ...bishopMoves(range)]; }

// ── Piece presets ──
const PIECES = [
  { value: 'knight',   label: 'Knight (1+2)',        gen: () => leaperMoves(1, 2) },
  { value: 'camel',    label: 'Camel (1+3)',          gen: () => leaperMoves(1, 3) },
  { value: 'zebra',    label: 'Zebra (2+3)',           gen: () => leaperMoves(2, 3) },
  { value: 'giraffe',  label: 'Giraffe (1+4)',         gen: () => leaperMoves(1, 4) },
  { value: 'leaper34', label: 'Leaper (3+4)',          gen: () => leaperMoves(3, 4) },
  { value: 'alfil',    label: 'Alfil (2+2)',            gen: () => leaperMoves(2, 2) },
  { value: 'dabbaba',  label: 'Dabbaba (2+0)',          gen: () => leaperMoves(2, 0) },
  { value: 'ferz',     label: 'Ferz / Bishop×1',        gen: () => leaperMoves(1, 1) },
  { value: 'wazir',    label: 'Wazir / Rook×1',         gen: () => leaperMoves(1, 0) },
  { value: 'king',     label: 'King (8 neighbors)',      gen: () => queenMoves(1) },
  { value: 'bishop2',  label: 'Bishop ≤2 steps',        gen: () => bishopMoves(2) },
  { value: 'rook2',    label: 'Rook ≤2 steps',          gen: () => rookMoves(2) },
  { value: 'queen2',   label: 'Queen ≤2 steps',         gen: () => queenMoves(2) },
  { value: 'custom',   label: 'Custom (a+b)…',          gen: null },
];

// ── DOM refs ──
const numTeamsEl       = document.getElementById('numTeams');
const teamsWrap        = document.getElementById('teamsWrap');
const nNum             = document.getElementById('nNum');
const layoutEl         = document.getElementById('layout');
const layoutDesc       = document.getElementById('layoutDesc');
const zigzagWidthField = document.getElementById('zigzagWidthField');
const btnGenerate      = document.getElementById('btnGenerate');
const btnExport        = document.getElementById('btnExport');
const btnFit           = document.getElementById('btnFit');
const progressWrap     = document.getElementById('progressWrap');
const progressBar      = document.getElementById('progressBar');
const progressText     = document.getElementById('progressText');
const info             = document.getElementById('info');
const canvas           = document.getElementById('canvas');
const ctx              = canvas.getContext('2d');

// ── Fit to window ──
let fitMode = false;

function applyFit() {
  if (!fitMode || canvas.width <= 1) {
    canvas.style.width        = '';
    canvas.style.height       = '';
    canvas.style.imageRendering = '';
    return;
  }
  const main    = document.getElementById('main');
  const toolbar = document.getElementById('mainToolbar');
  const availW  = main.clientWidth  - 40;
  const availH  = main.clientHeight - toolbar.offsetHeight - 30;
  const scale   = Math.min(1, availW / canvas.width, availH / canvas.height);
  canvas.style.width        = Math.round(canvas.width  * scale) + 'px';
  canvas.style.height       = Math.round(canvas.height * scale) + 'px';
  canvas.style.imageRendering = 'auto';
}

btnFit.addEventListener('click', () => {
  fitMode = !fitMode;
  btnFit.classList.toggle('active', fitMode);
  btnFit.textContent = fitMode ? '⊡ 1:1' : '⊡ Fit';
  applyFit();
});

window.addEventListener('resize', applyFit);

// ── Team rows (color + piece type per team) ──
function rebuildTeams(n, initData) {
  const existing = Array.from({length: 6}, (_, i) => ({
    color: initData?.[i]?.color ?? document.getElementById(`tc${i}`)?.value ?? (DEFAULT_COLORS[i] ?? '#888888'),
    piece: initData?.[i]?.piece ?? document.getElementById(`pc${i}`)?.value ?? 'knight',
    pa:    initData?.[i]?.pa    ?? document.getElementById(`pa${i}`)?.value ?? '1',
    pb:    initData?.[i]?.pb    ?? document.getElementById(`pb${i}`)?.value ?? '2',
  }));
  teamsWrap.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const { color, piece, pa, pb } = existing[i];

    const container = document.createElement('div');

    const row = document.createElement('div');
    row.className = 'team-row';

    const colorInp = document.createElement('input');
    colorInp.type = 'color';
    colorInp.value = color;
    colorInp.id = `tc${i}`;

    const lbl = document.createElement('span');
    lbl.className = 'team-label';
    lbl.textContent = `T${i+1}`;

    const sel = document.createElement('select');
    sel.id = `pc${i}`;
    for (const p of PIECES) {
      const opt = document.createElement('option');
      opt.value = p.value;
      opt.textContent = p.label;
      if (p.value === piece) opt.selected = true;
      sel.appendChild(opt);
    }

    row.append(colorInp, lbl, sel);

    // Custom a+b inputs, shown only when "custom" is selected
    const customDiv = document.createElement('div');
    customDiv.className = 'custom-ab';
    customDiv.id = `ca${i}`;
    customDiv.style.display = piece === 'custom' ? '' : 'none';

    const paInp = document.createElement('input');
    paInp.type = 'number'; paInp.id = `pa${i}`;
    paInp.min = '0'; paInp.max = '20'; paInp.value = pa;

    const sep = document.createElement('span');
    sep.textContent = '+';

    const pbInp = document.createElement('input');
    pbInp.type = 'number'; pbInp.id = `pb${i}`;
    pbInp.min = '0'; pbInp.max = '20'; pbInp.value = pb;

    const customLabel = document.createElement('span');
    customLabel.textContent = 'leaper';

    customDiv.append(paInp, sep, pbInp, customLabel);

    sel.addEventListener('change', () => {
      customDiv.style.display = sel.value === 'custom' ? '' : 'none';
      updateURL();
    });
    colorInp.addEventListener('input', updateURL);
    paInp.addEventListener('input', updateURL);
    pbInp.addEventListener('input', updateURL);

    container.append(row, customDiv);
    teamsWrap.appendChild(container);
  }
}
numTeamsEl.addEventListener('change', () => { rebuildTeams(+numTeamsEl.value); updateURL(); });
const hasParams = readParams();
if (!hasParams) rebuildTeams(2);

// ── Compute move set for a team from current UI state ──
function getTeamMoves(i) {
  const piece = document.getElementById(`pc${i}`)?.value ?? 'knight';
  if (piece === 'custom') {
    const a = Math.max(0, +document.getElementById(`pa${i}`)?.value || 0);
    const b = Math.max(0, +document.getElementById(`pb${i}`)?.value || 0);
    return leaperMoves(a, b);
  }
  const preset = PIECES.find(p => p.value === piece);
  return preset?.gen ? preset.gen() : leaperMoves(1, 2);
}

// ── Worker state ──
let worker = null;
let running = false;

function setRunning(yes) {
  running = yes;
  btnGenerate.textContent = yes ? '■ Stop' : '▶ Generate';
  btnGenerate.classList.toggle('stopping', yes);
  if (yes) progressWrap.classList.add('show');
  else     progressWrap.classList.remove('show');
}

// ── Generate / Stop ──
btnGenerate.addEventListener('click', () => {
  if (running) {
    worker?.terminate();
    worker = null;
    setRunning(false);
    info.textContent = 'Stopped.';
    return;
  }

  const n           = Math.max(1, +nNum.value || 1000);
  const numTeams    = +numTeamsEl.value;
  const layout      = layoutEl.value;
  const zigzagWidth = Math.max(2, +document.getElementById('zigzagWidth').value || 300);
  const sequential  = document.getElementById('sequential').checked;
  const teamMoves   = Array.from({length: numTeams}, (_, i) => getTeamMoves(i));

  setRunning(true);
  btnExport.disabled = true;
  progressBar.value = 0;
  progressText.textContent = 'Starting…';
  info.textContent = `Computing ${n.toLocaleString()} pieces…`;

  const blob = new Blob([WORKER_SRC], { type: 'application/javascript' });
  const url  = URL.createObjectURL(blob);
  worker = new Worker(url);
  URL.revokeObjectURL(url);

  worker.onmessage = (e) => {
    const msg = e.data;
    if (msg.type === 'progress') {
      const pct = Math.round(msg.done / msg.total * 100);
      progressBar.value = pct;
      const eta = (msg.elapsed / msg.done) * (msg.total - msg.done);
      progressText.textContent =
        `${pct}%  ·  ${fmtMs(msg.elapsed)} elapsed  ·  ~${fmtMs(eta)} left`;
    } else if (msg.type === 'done') {
      worker = null;
      setRunning(false);
      render(msg, n, numTeams, layout);
    }
  };

  worker.onerror = (e) => {
    worker = null;
    setRunning(false);
    info.textContent = `Error: ${e.message}`;
  };

  worker.postMessage({ n, numTeams, layout, zigzagWidth, sequential, teamMoves });
});

// ── Render ──
function render(msg, n, numTeams, layout) {
  const { xs, ys, teams, elapsed } = msg;
  const cs  = +document.getElementById('cellSize').value;
  const pad = Math.max(0, +document.getElementById('padding').value || 0);
  const bgRGB = hexToRGB(document.getElementById('bgColor').value);
  const colors = Array.from({length: numTeams}, (_, i) =>
    hexToRGB(document.getElementById(`tc${i}`)?.value || DEFAULT_COLORS[i]));

  let x0=Infinity, x1=-Infinity, y0=Infinity, y1=-Infinity;
  for (let i = 0; i < n; i++) {
    if (xs[i] < x0) x0 = xs[i];
    if (xs[i] > x1) x1 = xs[i];
    if (ys[i] < y0) y0 = ys[i];
    if (ys[i] > y1) y1 = ys[i];
  }

  const W = (x1 - x0 + 1 + 2*pad) * cs;
  const H = (y1 - y0 + 1 + 2*pad) * cs;

  const MAX_PX = 256 * 1024 * 1024;
  if (W * H > MAX_PX) {
    info.textContent =
      `Canvas too large (${W}×${H} = ${(W*H/1e6).toFixed(0)} MP). Reduce N or cell size.`;
    btnExport.disabled = false;
    return;
  }

  canvas.width  = W;
  canvas.height = H;

  const imgData = ctx.createImageData(W, H);
  const data    = imgData.data;

  const [br, bg, bb] = bgRGB;
  for (let i = 0; i < data.length; i += 4) {
    data[i]=br; data[i+1]=bg; data[i+2]=bb; data[i+3]=255;
  }

  // Spiral uses mathematical y-axis (+y=up), so flip vertically.
  const flipY = (layout === 'spiral');

  for (let i = 0; i < n; i++) {
    const [r, g, b] = colors[teams[i]];
    const px = (xs[i] - x0 + pad) * cs;
    const py = flipY
      ? (y1 - ys[i] + pad) * cs
      : (ys[i] - y0 + pad) * cs;
    if (cs === 1) {
      const idx = (py * W + px) * 4;
      data[idx]=r; data[idx+1]=g; data[idx+2]=b; data[idx+3]=255;
    } else {
      for (let dy = 0; dy < cs; dy++) {
        for (let dx = 0; dx < cs; dx++) {
          const idx = ((py+dy)*W + (px+dx)) * 4;
          data[idx]=r; data[idx+1]=g; data[idx+2]=b; data[idx+3]=255;
        }
      }
    }
  }

  ctx.putImageData(imgData, 0, 0);

  info.textContent =
    `${n.toLocaleString()} pieces · ${W}×${H} px · computed in ${fmtMs(elapsed)}`;
  btnExport.disabled = false;
  btnFit.disabled = false;
  applyFit();
}

// ── Export ──
btnExport.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = `pieces-${nNum.value}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
});

// ── Utilities ──
function hexToRGB(hex) {
  return [
    parseInt(hex.slice(1,3), 16),
    parseInt(hex.slice(3,5), 16),
    parseInt(hex.slice(5,7), 16),
  ];
}

function fmtMs(ms) {
  if (ms < 1000)  return `${Math.round(ms)} ms`;
  if (ms < 60000) return `${(ms/1000).toFixed(1)} s`;
  return `${Math.floor(ms/60000)} m ${Math.round((ms%60000)/1000)} s`;
}

// ── URL deep-linking ──
function updateURL() {
  const numTeams = +numTeamsEl.value;
  const teamEntries = [];
  for (let i = 0; i < numTeams; i++) {
    const color = (document.getElementById(`tc${i}`)?.value || DEFAULT_COLORS[i]).slice(1);
    const piece = document.getElementById(`pc${i}`)?.value || 'knight';
    if (piece === 'custom') {
      const a = document.getElementById(`pa${i}`)?.value || '1';
      const b = document.getElementById(`pb${i}`)?.value || '2';
      teamEntries.push(`${color}:custom:${a}:${b}`);
    } else {
      teamEntries.push(`${color}:${piece}`);
    }
  }
  const qs = [
    `n=${nNum.value}`,
    `teams=${teamEntries.join(',')}`,
    `layout=${layoutEl.value}`,
    `zw=${document.getElementById('zigzagWidth').value}`,
    `seq=${document.getElementById('sequential').checked ? '1' : '0'}`,
    `cs=${document.getElementById('cellSize').value}`,
    `bg=${document.getElementById('bgColor').value.slice(1)}`,
    `pad=${document.getElementById('padding').value}`,
  ].join('&');
  history.replaceState(null, '', '?' + qs);
}

function readParams() {
  const p = new URLSearchParams(location.search);
  if (!p.size) return false;

  const n = Math.max(100, +p.get('n') || 500000);
  nNum.value = n;

  const teamEntries = (p.get('teams') || '').split(',').filter(Boolean);
  const numTeams = Math.min(6, Math.max(2, teamEntries.length || 2));
  numTeamsEl.value = numTeams;

  const teamData = Array.from({length: 6}, (_, i) => {
    const parts = (teamEntries[i] || '').split(':');
    return {
      color: parts[0] ? '#' + parts[0] : DEFAULT_COLORS[i],
      piece: parts[1] || 'knight',
      pa:    parts[2] || '1',
      pb:    parts[3] || '2',
    };
  });
  rebuildTeams(numTeams, teamData);

  layoutEl.value = p.get('layout') || 'spiral';
  updateLayoutUI();
  if (p.has('zw')) document.getElementById('zigzagWidth').value = p.get('zw');
  if (p.has('seq')) document.getElementById('sequential').checked = p.get('seq') === '1';
  if (p.has('cs')) document.getElementById('cellSize').value = p.get('cs');
  if (p.has('bg')) document.getElementById('bgColor').value = '#' + p.get('bg');
  if (p.has('pad')) document.getElementById('padding').value = p.get('pad');

  setTimeout(() => btnGenerate.click(), 0);
  return true;
}

document.getElementById('versionLabel').textContent = VERSION;

// ── Gallery ──
let galAbort = false;
let galActiveWorkers = [];

function shortName(label) {
  return label.replace(/\s*[(\[].*/, '').replace(/…$/, '').trim();
}

function renderThumbToCanvas(thumbCanvas, msg, colors, layout, bgHex) {
  const { xs, ys, teams } = msg;
  const n = xs.length;
  if (!n) return;
  let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
  for (let i=0;i<n;i++) {
    if(xs[i]<x0)x0=xs[i]; if(xs[i]>x1)x1=xs[i];
    if(ys[i]<y0)y0=ys[i]; if(ys[i]>y1)y1=ys[i];
  }
  const W=x1-x0+1, H=y1-y0+1;
  if(W<=0||H<=0) return;
  const off=document.createElement('canvas');
  off.width=W; off.height=H;
  const offCtx=off.getContext('2d');
  const imgData=offCtx.createImageData(W,H);
  const d=imgData.data;
  const [br,bg,bb]=hexToRGB(bgHex||'#ffffff');
  for(let i=0;i<d.length;i+=4){d[i]=br;d[i+1]=bg;d[i+2]=bb;d[i+3]=255;}
  const flipY=(layout==='spiral');
  const cRGBs=colors.map(hexToRGB);
  for(let i=0;i<n;i++){
    const[r,g,b]=cRGBs[teams[i]];
    const px=xs[i]-x0;
    const py=flipY?(y1-ys[i]):(ys[i]-y0);
    const idx=(py*W+px)*4;
    d[idx]=r;d[idx+1]=g;d[idx+2]=b;d[idx+3]=255;
  }
  offCtx.putImageData(imgData,0,0);
  const tw=thumbCanvas.width,th=thumbCanvas.height;
  const scale=Math.min(tw/W,th/H);
  const dw=Math.round(W*scale),dh=Math.round(H*scale);
  const dx=Math.round((tw-dw)/2),dy=Math.round((th-dh)/2);
  const tc=thumbCanvas.getContext('2d');
  tc.fillStyle=bgHex||'#ffffff';
  tc.fillRect(0,0,tw,th);
  tc.imageSmoothingEnabled=false;
  tc.drawImage(off,0,0,W,H,dx,dy,dw,dh);
  return off;
}

function startGalleryWorker(n,numTeams,layout,zigzagWidth,sequential,teamMoves) {
  return new Promise((resolve,reject)=>{
    const blob=new Blob([WORKER_SRC],{type:'application/javascript'});
    const url=URL.createObjectURL(blob);
    const w=new Worker(url);
    URL.revokeObjectURL(url);
    galActiveWorkers.push(w);
    w.onmessage=e=>{
      if(e.data.type==='done'){
        galActiveWorkers=galActiveWorkers.filter(x=>x!==w);
        w.terminate();
        resolve(e.data);
      }
    };
    w.onerror=e=>{
      galActiveWorkers=galActiveWorkers.filter(x=>x!==w);
      w.terminate();
      reject(e);
    };
    w.postMessage({n,numTeams,layout,zigzagWidth,sequential,teamMoves});
  });
}

async function runConcurrent(tasks, limit) {
  let i=0;
  const run=async()=>{ while(i<tasks.length&&!galAbort){await tasks[i++]();} };
  await Promise.all(Array.from({length:limit},run));
}

document.getElementById('btnGallery').addEventListener('click', async function() {
  const galSection=document.getElementById('gallerySection');
  const galStatus=document.getElementById('galleryStatus');
  const galGrid=document.getElementById('galleryGrid');

  // Stop if running
  if(galActiveWorkers.length>0){
    galAbort=true;
    galActiveWorkers.forEach(w=>w.terminate());
    galActiveWorkers=[];
    this.textContent='▦ Gallery';
    galStatus.textContent='Stopped.';
    return;
  }

  // Close if already showing
  if(galSection.classList.contains('show')){
    galSection.classList.remove('show');
    document.getElementById('canvasWrap').style.display='';
    document.getElementById('info').textContent='';
    this.textContent='▦ Gallery';
    return;
  }

  // Start gallery
  galAbort=false;
  const numTeams=+numTeamsEl.value;
  const layout=layoutEl.value;
  const zigzagWidth=Math.max(2,+document.getElementById('zigzagWidth').value||300);
  const sequential=document.getElementById('sequential').checked;
  const galN=Math.max(1000,Math.min(500000,+document.getElementById('galleryN').value||20000));
  const bgHex=document.getElementById('bgColor').value;
  const colors=Array.from({length:numTeams},(_,i)=>document.getElementById(`tc${i}`)?.value||DEFAULT_COLORS[i]);

  // All named piece types (rows = T1, cols = T2, T3+ stay fixed at current)
  const pt=PIECES.filter(p=>p.value!=='custom');

  const combos=[];
  for(const rp of pt){
    for(const cp of pt){
      const pieceValues=Array.from({length:numTeams},(_,t)=>{
        if(t===0) return rp.value;
        if(t===1) return cp.value;
        return document.getElementById(`pc${t}`)?.value||'knight';
      });
      const teamMoves=pieceValues.map(pv=>{
        if(pv==='custom') return leaperMoves(1,2);
        return PIECES.find(p=>p.value===pv)?.gen?.()??leaperMoves(1,2);
      });
      combos.push({pieceValues,teamMoves,rp,cp});
    }
  }

  // Switch to gallery view
  document.getElementById('canvasWrap').style.display='none';
  galSection.classList.add('show');
  document.getElementById('info').textContent='';
  this.textContent='■ Stop Gallery';

  // Build grid: [label col] + [13 piece cols]
  galGrid.innerHTML='';
  galGrid.style.gridTemplateColumns=`60px repeat(${pt.length},72px)`;

  // Header row: empty corner + column (T2) labels
  galGrid.appendChild(document.createElement('div'));
  for(const cp of pt){
    const hdr=document.createElement('div');
    hdr.className='gal-col-hdr';
    hdr.textContent=shortName(cp.label);
    galGrid.appendChild(hdr);
  }

  // Data rows: row (T1) label + cells
  for(let ri=0;ri<pt.length;ri++){
    const rp=pt[ri];
    const rowLbl=document.createElement('div');
    rowLbl.className='gal-row-hdr';
    rowLbl.textContent=shortName(rp.label);
    galGrid.appendChild(rowLbl);
    for(let ci=0;ci<pt.length;ci++){
      const combo=combos[ri*pt.length+ci];
      const cell=document.createElement('div');
      cell.className='gal-cell';
      const tc=document.createElement('canvas');
      tc.width=72; tc.height=72;
      const tip=document.createElement('div');
      tip.className='gal-cell-tip';
      tip.textContent=`T1: ${shortName(combo.rp.label)}\nT2: ${shortName(combo.cp.label)}`;
      cell.append(tc,tip);
      cell.addEventListener('click',()=>{
        for(let t=0;t<numTeams;t++){
          const sel=document.getElementById(`pc${t}`);
          if(sel&&combo.pieceValues[t]) sel.value=combo.pieceValues[t];
        }
        galSection.classList.remove('show');
        document.getElementById('galPreview').style.display='none';
        document.getElementById('canvasWrap').style.display='';
        document.getElementById('info').textContent='Config applied — click Generate.';
        document.getElementById('btnGallery').textContent='▦ Gallery';
        updateURL();
      });
      cell.addEventListener('mouseenter',()=>{
        if(!combo.offCanvas) return;
        const preview=document.getElementById('galPreview');
        const pc=document.getElementById('galPreviewCanvas');
        const lbl=document.getElementById('galPreviewLabel');
        const W=combo.offCanvas.width, H=combo.offCanvas.height;
        const maxSize=350;
        const scale=maxSize/Math.max(W,H);
        const dw=Math.round(W*scale), dh=Math.round(H*scale);
        pc.width=dw; pc.height=dh;
        const pctx=pc.getContext('2d');
        pctx.imageSmoothingEnabled=false;
        pctx.drawImage(combo.offCanvas,0,0,W,H,0,0,dw,dh);
        lbl.textContent=`T1: ${shortName(combo.rp.label)} · T2: ${shortName(combo.cp.label)}`;
        const rect=cell.getBoundingClientRect();
        const pw=dw+14, ph=dh+34;
        let left=rect.right+8;
        if(left+pw>window.innerWidth) left=rect.left-pw-8;
        let top=rect.top;
        if(top+ph>window.innerHeight) top=window.innerHeight-ph-8;
        preview.style.left=`${Math.max(8,left)}px`;
        preview.style.top=`${Math.max(8,top)}px`;
        preview.style.display='block';
      });
      cell.addEventListener('mouseleave',()=>{
        document.getElementById('galPreview').style.display='none';
      });
      combo.cell=cell;
      combo.thumbCanvas=tc;
      galGrid.appendChild(cell);
    }
  }

  // Run all workers with concurrency 4
  let doneCount=0;
  galStatus.textContent=`Generating 0/${combos.length} thumbnails (N=${galN.toLocaleString()})…`;

  const tasks=combos.map(combo=>async()=>{
    if(galAbort) return;
    try{
      const msg=await startGalleryWorker(galN,numTeams,layout,zigzagWidth,sequential,combo.teamMoves);
      if(!galAbort){
        combo.offCanvas=renderThumbToCanvas(combo.thumbCanvas,msg,colors,layout,bgHex);
        doneCount++;
        galStatus.textContent=`${doneCount}/${combos.length} thumbnails ready`;
      }
    }catch(e){
      if(!galAbort) console.warn('gallery:',e);
    }
  });

  await runConcurrent(tasks,4);

  if(!galAbort){
    galStatus.textContent=`${combos.length} thumbnails — click any to apply config, or click ▦ Gallery to close`;
    this.textContent='▦ Gallery';
  } else {
    galAbort=false;
    this.textContent='▦ Gallery';
  }
});
